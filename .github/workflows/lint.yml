name: Lint Code

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run HTML lint
        run: npx htmlhint "**/*.html"

      - name: Run CSS lint
        run: npx stylelint "**/*.css"

      - name: Run JS lint
        run: npx eslint "**/*.js"